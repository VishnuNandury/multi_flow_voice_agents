services:
  - type: web
    name: multi-flow-voice-agent
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      # --- Required ---
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # --- Auth (v2) ---
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: TOKEN_EXPIRE_HOURS
        value: "24"

      # --- Database (v2) ---
      # Defaults to SQLite at ./data/agent.db — no change needed for SQLite
      # Set DATABASE_URL to a Postgres URL if you want persistent storage on Render
      # - key: DATABASE_URL
      #   sync: false

      # --- inya.ai (6th pipeline — external agent webhook) ---
      - key: INYA_WEBHOOK_SECRET
        sync: false

      # --- Sarvam AI (v2 — 5th pipeline) ---
      - key: SARVAM_API_KEY
        sync: false

      # --- Groq / Ollama (v2 — 5th pipeline LLM fallback) ---
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      # - key: OLLAMA_BASE_URL
      #   sync: false
      # - key: OLLAMA_MODEL
      #   value: llama3.1

      # --- Outbound Campaigns: Required ---
      # Your Render app's public URL — used to build Twilio/Exotel webhook URLs
      - key: PUBLIC_URL
        sync: false

      # --- Twilio (outbound calling — provider option 1) ---
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

      # --- Exotel (outbound calling — provider option 2, India-based) ---
      - key: EXOTEL_API_KEY
        sync: false
      - key: EXOTEL_API_TOKEN
        sync: false
      - key: EXOTEL_SID
        sync: false
      - key: EXOTEL_SUBDOMAIN
        value: api.exotel.com
      - key: EXOTEL_PHONE_NUMBER
        sync: false

      # --- WhatsApp Business Calling API ---
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false

      # --- TURN Server ---
      - key: TURN_URL
        sync: false
      - key: TURN_USERNAME
        sync: false
      - key: TURN_CREDENTIAL
        sync: false
