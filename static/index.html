<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converse — Voice Agent Platform</title>
<style>
:root {
  --bg:        #0b0f1a;
  --surface:   #111827;
  --card:      #1a2133;
  --border:    #1f2d40;
  --accent:    #6366f1;
  --accent-h:  #4f46e5;
  --green:     #10b981;
  --amber:     #f59e0b;
  --red:       #ef4444;
  --blue:      #3b82f6;
  --text:      #f1f5f9;
  --muted:     #94a3b8;
  --faint:     #4b5d73;
  --sidebar-w: 220px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px}

/* ── Login ─────────────────────────────────── */
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#1a2133 0%,#0b0f1a 70%)}
.login-card{width:340px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem}
.login-logo{display:flex;align-items:center;gap:.6rem;font-size:1.3rem;font-weight:700;color:var(--text);margin-bottom:1.75rem}
.login-logo span{background:var(--accent);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:1rem}
.login-card h2{font-size:1.1rem;margin-bottom:.3rem}
.login-card p{color:var(--muted);font-size:.8rem;margin-bottom:1.5rem}
.form-group{margin-bottom:.9rem}
.form-group label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:.3rem;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.form-group input{width:100%;padding:.6rem .8rem;border-radius:8px;border:1px solid var(--border);background:#0b0f1a;color:var(--text);font-size:.88rem;outline:none;transition:border-color .15s}
.form-group input:focus{border-color:var(--accent)}
#login-error{color:var(--red);font-size:.78rem;margin-bottom:.75rem;display:none}
.btn-primary{width:100%;padding:.65rem;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:.88rem;font-weight:600;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:var(--accent-h)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

/* ── App shell ──────────────────────────────── */
#app{display:none;height:100vh;overflow:hidden}
.shell{display:flex;height:100%}

/* ── Sidebar ────────────────────────────────── */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-brand{padding:1.2rem 1rem;display:flex;align-items:center;gap:.6rem;border-bottom:1px solid var(--border)}
.brand-icon{background:var(--accent);border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.brand-name{font-weight:700;font-size:.95rem;letter-spacing:.02em}
.brand-tag{font-size:.6rem;color:var(--accent);font-weight:600;background:rgba(99,102,241,.12);padding:.1rem .35rem;border-radius:4px;margin-left:auto}
.nav{flex:1;padding:.75rem .5rem;display:flex;flex-direction:column;gap:.15rem}
.nav-item{display:flex;align-items:center;gap:.6rem;padding:.55rem .75rem;border-radius:8px;color:var(--muted);text-decoration:none;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
.nav-item.active{background:rgba(99,102,241,.15);color:var(--accent)}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-section{font-size:.65rem;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;padding:.5rem .75rem .25rem;font-weight:600}
.sidebar-footer{padding:.75rem .5rem;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;border-radius:8px}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:.78rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-role{font-size:.65rem;color:var(--muted)}
.btn-logout{background:none;border:none;color:var(--muted);cursor:pointer;padding:.25rem;border-radius:4px;transition:color .15s}
.btn-logout:hover{color:var(--red)}

/* ── Main area ──────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.breadcrumb{font-size:.82rem;color:var(--muted);display:flex;align-items:center;gap:.4rem}
.breadcrumb strong{color:var(--text);font-weight:600}
.active-indicator{display:flex;align-items:center;gap:.45rem;font-size:.78rem;color:var(--muted)}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block}
.pulse.on{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.content{flex:1;overflow-y:auto;padding:1.5rem}

/* ── Cards / KPIs ───────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem}
.kpi-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:.5rem}
.kpi-value{font-size:1.75rem;font-weight:700;color:var(--text);line-height:1}
.kpi-sub{font-size:.7rem;color:var(--muted);margin-top:.35rem}
.kpi-value.green{color:var(--green)}
.kpi-value.amber{color:var(--amber)}

/* ── Section header ─────────────────────────── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem}
.section-title{font-size:.88rem;font-weight:600;color:var(--text)}
.section-action{font-size:.75rem;color:var(--accent);cursor:pointer;background:none;border:none;padding:0}
.section-action:hover{text-decoration:underline}

/* ── Table ──────────────────────────────────── */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.5rem}
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:.65rem 1rem;text-align:left;font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:rgba(0,0,0,.15)}
.data-table td{padding:.7rem 1rem;font-size:.8rem;border-bottom:1px solid rgba(31,45,64,.5);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(255,255,255,.02)}
.empty-row td{text-align:center;color:var(--faint);padding:2rem}

/* ── Badges ─────────────────────────────────── */
.badge{display:inline-flex;align-items:center;font-size:.62rem;font-weight:600;padding:.2rem .5rem;border-radius:9999px;text-transform:uppercase;letter-spacing:.03em}
.badge-stt{background:rgba(59,130,246,.12);color:#60a5fa}
.badge-tts{background:rgba(167,139,250,.12);color:#a78bfa}
.badge-llm{background:rgba(16,185,129,.12);color:#34d399}
.badge-ptp{background:rgba(16,185,129,.12);color:#34d399}
.badge-callback{background:rgba(245,158,11,.12);color:#fbbf24}
.badge-incomplete{background:rgba(75,93,115,.12);color:#94a3b8}
.badge-wrong_person{background:rgba(239,68,68,.12);color:#f87171}
.badge-active{background:rgba(99,102,241,.12);color:#818cf8}

/* ── Pipeline cards ─────────────────────────── */
.pipeline-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.pipeline-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;transition:border-color .15s}
.pipeline-card:hover{border-color:var(--faint)}
.pipeline-card.featured{border-color:rgba(99,102,241,.3);background:linear-gradient(135deg,#1a2133 0%,#1a1f35 100%);grid-column:1/-1}
.pipeline-card h3{font-size:.9rem;font-weight:600;margin-bottom:.5rem}
.pipeline-badges{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.75rem}
.pipeline-desc{font-size:.75rem;color:var(--muted);margin-bottom:1rem;line-height:1.45}
.pipeline-warn{font-size:.7rem;color:var(--amber);background:rgba(245,158,11,.08);border-radius:6px;padding:.35rem .5rem;margin-bottom:.75rem}
.btn-connect{width:100%;padding:.55rem;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:.8rem;font-weight:600;cursor:pointer;transition:background .15s}
.btn-connect:hover{background:var(--accent-h)}
.btn-connect:disabled{background:var(--faint);cursor:not-allowed;opacity:.6}

/* ── Config panel ───────────────────────────── */
.config-toggle-btn{width:100%;padding:.55rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:.78rem;font-weight:500;display:flex;align-items:center;justify-content:space-between;margin-bottom:.1rem;transition:all .15s}
.config-toggle-btn:hover{border-color:var(--faint);color:var(--text)}
.config-toggle-btn.open .arrow{transform:rotate(180deg)}
.config-toggle-btn .arrow{transition:transform .2s}
.config-panel-body{display:none;background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:1rem;margin-bottom:1rem}
.config-panel-body.open{display:block}
.cfg-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.cfg-col h4{font-size:.65rem;color:var(--faint);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.6rem;font-weight:600}
.cfg-field{margin-bottom:.5rem}
.cfg-field label{display:block;font-size:.68rem;color:var(--muted);margin-bottom:.22rem;font-weight:500}
.cfg-field input,.cfg-field select{width:100%;padding:.38rem .55rem;border-radius:6px;border:1px solid var(--border);background:#0b0f1a;color:var(--text);font-size:.78rem;outline:none;transition:border-color .15s}
.cfg-field input:focus,.cfg-field select:focus{border-color:var(--accent)}
.cfg-field-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}

/* ── Flow bar (in agent page) ───────────────── */
.flow-bar{display:flex;align-items:center;justify-content:center;padding:.65rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:1rem;overflow-x:auto;gap:0}
.flow-step{display:flex;align-items:center;white-space:nowrap}
.flow-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;border:2px solid var(--faint);background:transparent;color:var(--faint);transition:all .3s;flex-shrink:0}
.flow-dot.active{border-color:var(--blue);background:var(--blue);color:#fff;box-shadow:0 0 10px rgba(59,130,246,.4)}
.flow-dot.done{border-color:var(--green);background:var(--green);color:#fff}
.flow-label{font-size:.6rem;color:var(--faint);margin:0 .3rem;transition:color .3s}
.flow-label.active{color:#93c5fd;font-weight:600}
.flow-label.done{color:#6ee7b7}
.flow-connector{width:18px;height:2px;background:var(--border);flex-shrink:0;transition:background .3s}
.flow-connector.done{background:var(--green)}

/* ── iframe container ───────────────────────── */
.client-bar{display:flex;align-items:center;justify-content:space-between;padding:.55rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:10px 10px 0 0;margin-bottom:0}
.client-bar-info{display:flex;align-items:center;gap:.6rem;font-size:.8rem}
.client-bar strong{color:var(--text)}
.btn-back{padding:.35rem .75rem;border-radius:6px;border:1px solid var(--faint);background:none;color:var(--muted);font-size:.75rem;cursor:pointer;transition:all .15s}
.btn-back:hover{background:var(--border);color:var(--text)}
#client-iframe{width:100%;border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;background:var(--bg)}

/* ── Conversations filters ───────────────────── */
.filter-bar{display:flex;gap:.75rem;margin-bottom:1rem;align-items:center}
.filter-bar input,.filter-bar select{padding:.4rem .7rem;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.8rem;outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--accent)}
.filter-bar input{flex:1}
.btn-view{padding:.3rem .65rem;border-radius:6px;border:1px solid var(--faint);background:none;color:var(--muted);font-size:.72rem;cursor:pointer;transition:all .15s}
.btn-view:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── Transcript modal ───────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:min(640px,100%);max-height:80vh;display:flex;flex-direction:column}
.modal-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:.95rem;font-weight:600}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:.2rem}
.modal-close:hover{color:var(--text)}
.modal-meta{padding:.75rem 1.25rem;border-bottom:1px solid var(--border);display:flex;gap:1rem;flex-wrap:wrap;font-size:.75rem;color:var(--muted)}
.modal-meta span{display:flex;align-items:center;gap:.3rem}
.modal-body{overflow-y:auto;padding:1rem 1.25rem;display:flex;flex-direction:column;gap:.6rem}
.msg{padding:.6rem .85rem;border-radius:10px;font-size:.8rem;line-height:1.4;max-width:88%}
.msg.user{background:rgba(59,130,246,.12);color:#93c5fd;align-self:flex-start;border-radius:10px 10px 10px 2px}
.msg.assistant{background:rgba(99,102,241,.12);color:#c4b5fd;align-self:flex-end;border-radius:10px 10px 2px 10px}
.msg-role{font-size:.62rem;font-weight:600;opacity:.7;margin-bottom:.2rem;text-transform:uppercase}

/* ── Analytics ───────────────────────────────── */
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.analytics-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
.analytics-card h4{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem}
.bar-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;font-size:.75rem}
.bar-label{width:100px;color:var(--muted);text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.bar-fill.green{background:var(--green)}
.bar-fill.amber{background:var(--amber)}
.bar-fill.red{background:var(--red)}
.bar-fill.blue{background:var(--blue)}
.bar-fill.accent{background:var(--accent)}
.bar-count{width:28px;color:var(--muted);font-size:.68rem;text-align:right;flex-shrink:0}
.volume-chart{display:flex;align-items:flex-end;gap:4px;height:80px}
.vol-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.vol-bar{width:100%;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px;transition:height .3s;opacity:.8}
.vol-label{font-size:.58rem;color:var(--faint)}

/* ── Settings ────────────────────────────────── */
.settings-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.settings-section h3{font-size:.82rem;font-weight:600;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--border)}
.api-key-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.api-key-item{display:flex;align-items:center;justify-content:space-between;padding:.6rem .85rem;border-radius:8px;border:1px solid var(--border);background:#0b0f1a}
.api-key-name{font-size:.78rem;font-weight:600}
.api-key-status{font-size:.7rem;display:flex;align-items:center;gap:.3rem}
.dot-ok{color:var(--green)}
.dot-miss{color:var(--red)}
.settings-form{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.settings-field{display:flex;flex-direction:column;gap:.2rem}
.settings-field label{font-size:.68rem;color:var(--muted);font-weight:500}
.settings-field input,.settings-field select{padding:.4rem .6rem;border-radius:6px;border:1px solid var(--border);background:#0b0f1a;color:var(--text);font-size:.8rem;outline:none}
.settings-field input:focus{border-color:var(--accent)}
.btn-save{margin-top:1rem;padding:.5rem 1.25rem;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:.8rem;font-weight:600;cursor:pointer;transition:background .15s}
.btn-save:hover{background:var(--accent-h)}

/* ── Shared utility classes ──────────────────── */
.input{padding:.45rem .7rem;border-radius:8px;border:1px solid var(--border);background:#0b0f1a;color:var(--text);font-size:.82rem;outline:none;transition:border-color .15s}
.input:focus{border-color:var(--accent)}
select.input{cursor:pointer}
.btn{padding:.45rem 1rem;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:.82rem;font-weight:600;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--accent-h)}
.btn-ghost{padding:.45rem 1rem;border-radius:8px;border:1px solid var(--faint);background:none;color:var(--muted);font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s}
.btn-ghost:hover{background:var(--border);color:var(--text)}
.field-label{display:block;font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:500;margin-bottom:.25rem}

/* ── Active call banner ──────────────────────── */
.active-banner{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:10px;margin-bottom:1rem;font-size:.8rem}
.active-banner strong{color:var(--green)}

/* ── Pagination ──────────────────────────────── */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-top:1px solid var(--border);font-size:.75rem;color:var(--muted)}
.page-btns{display:flex;gap:.4rem}
.btn-page{padding:.3rem .65rem;border-radius:6px;border:1px solid var(--faint);background:none;color:var(--muted);font-size:.75rem;cursor:pointer;transition:all .15s}
.btn-page:hover,.btn-page.current{background:var(--accent);color:#fff;border-color:var(--accent)}

@media(max-width:900px){
  .sidebar{display:none}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .pipeline-grid{grid-template-columns:1fr}
  .analytics-grid{grid-template-columns:1fr}
  .settings-form,.api-key-grid,.cfg-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ═══════════════════ LOGIN PAGE ═══════════════════ -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo"><span>🎙</span> Converse</div>
    <h2>Welcome back</h2>
    <p>Sign in to your voice agent platform</p>
    <div id="login-error"></div>
    <div class="form-group"><label>Username</label><input id="luser" type="text" placeholder="admin" autocomplete="username"></div>
    <div class="form-group"><label>Password</label><input id="lpass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- ═══════════════════ APP SHELL ═══════════════════ -->
<div id="app">
  <div class="shell">

    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">🎙</div>
        <span class="brand-name">Converse</span>
        <span class="brand-tag">v2</span>
      </div>

      <div class="nav">
        <span class="nav-section">Main</span>
        <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </button>
        <button class="nav-item" data-page="agent" onclick="navigate('agent')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          Voice Agent
        </button>
        <button class="nav-item" data-page="conversations" onclick="navigate('conversations')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Conversations
        </button>
        <button class="nav-item" data-page="customers" onclick="navigate('customers')">

<script>
// ═══════════════════════════════════════════════════════════════
// Constants
// ═══════════════════════════════════════════════════════════════
const PIPELINES = [
  { stt:'deepgram', tts:'openai',  llm:'openai',  label:'Deepgram + OpenAI TTS',  desc:'Streaming STT via Deepgram Nova-3 with OpenAI voice synthesis. Best overall quality.', requires:['deepgram','openai'] },
  { stt:'deepgram', tts:'edge',    llm:'openai',  label:'Deepgram + Edge TTS',     desc:'Deepgram Nova-3 STT with free Microsoft Edge TTS. Excellent Hindi pronunciation.', requires:['deepgram','openai'] },
  { stt:'whisper',  tts:'openai',  llm:'openai',  label:'Whisper + OpenAI TTS',    desc:'OpenAI Whisper (gpt-4o-transcribe) STT with OpenAI voice synthesis.', requires:['openai'] },
  { stt:'whisper',  tts:'edge',    llm:'openai',  label:'Whisper + Edge TTS',      desc:'OpenAI Whisper STT with free Microsoft Edge TTS.', requires:['openai'] },
  { stt:'sarvam',   tts:'sarvam',  llm:'ollama',  label:'Sarvam AI + Ollama/Groq', desc:'Indian-made Sarvam AI (saarika STT + bulbul TTS) with Ollama or Groq LLM. Best for Indian languages.', requires:['sarvam'], featured:true },
  { type:'inya', label:'inya.ai Agent', desc:'Full-stack Indian voice AI managed by inya.ai (by Gnani.ai). inya handles STT, TTS and LLM. Calls are initiated via inya and outcomes sync back here.', requires:['inya'], featured:true },
];

const FLOW_NODES = [
  {id:'greeting',label:'Greeting'},{id:'overdue_info',label:'Overdue Info'},
  {id:'understand_situation',label:'Situation'},{id:'payment_options',label:'Options'},
  {id:'commitment',label:'Commitment'},{id:'promise_to_pay',label:'PTP'},{id:'end',label:'Complete'},
];

// ═══════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════
let token = localStorage.getItem('token') || '';
let currentUser = JSON.parse(localStorage.getItem('user') || '{}');
let currentPage = 'dashboard';
let pollInterval = null;
let convPage = 1;
let convFilter = { outcome: '', search: '' };
let configStatus = {};
let activeCall = false;

// ═══════════════════════════════════════════════════════════════
// API helper
// ═══════════════════════════════════════════════════════════════
async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { 'Content-Type':'application/json', ...(token ? {'Authorization':'Bearer '+token} : {}), ...(opts.headers||{}) },
  });
  if (res.status === 401) { doLogout(); return null; }
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ═══════════════════════════════════════════════════════════════
// Auth
// ═══════════════════════════════════════════════════════════════
document.getElementById('lpass').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
document.getElementById('luser').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('lpass').focus(); });

async function doLogin() {
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  const username = document.getElementById('luser').value.trim();
  const password = document.getElementById('lpass').value;
  err.style.display = 'none';
  if (!username || !password) { err.textContent = 'Please enter username and password.'; err.style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const data = await fetch('/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username,password}) });
    if (!data.ok) { const e = await data.json(); throw new Error(e.detail || 'Invalid credentials'); }
    const json = await data.json();
    token = json.access_token;
    currentUser = json.user;
    localStorage.setItem('token', token);
    localStorage.setItem('user', JSON.stringify(currentUser));
    showApp();
  } catch(e) {
    err.textContent = e.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function doLogout() {
  token = ''; currentUser = {};
  localStorage.removeItem('token'); localStorage.removeItem('user');
  if (pollInterval) clearInterval(pollInterval);
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
}

// ═══════════════════════════════════════════════════════════════
// Boot
// ═══════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  if (token) {
    // Verify token is still valid
    fetch('/auth/me', { headers: {'Authorization':'Bearer '+token} }).then(r => {
      if (r.ok) showApp();
      else doLogout();
    }).catch(() => doLogout());
  }
});

async function showApp() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  // Set sidebar user info
  const uname = currentUser.username || 'Admin';
  document.getElementById('sidebar-username').textContent = uname;
  document.getElementById('sidebar-role').textContent = currentUser.role === 'admin' ? 'Administrator' : 'User';
  document.getElementById('sidebar-avatar').textContent = uname[0].toUpperCase();
  // Fetch config status once
  try { configStatus = await api('/api/config-status') || {}; } catch(e) {}
  // Navigate to current page
  const hash = location.hash.replace('#','') || 'dashboard';
  navigate(hash);
  // Start active-call polling
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(pollActiveFlow, 2000);
}

// ═══════════════════════════════════════════════════════════════
// Router
// ═══════════════════════════════════════════════════════════════
const PAGE_TITLES = { dashboard:'Dashboard', agent:'Voice Agent', conversations:'Conversations', customers:'Customers', campaigns:'Campaigns', analytics:'Analytics', settings:'Settings' };

function navigate(page) {
  if (!['dashboard','agent','conversations','customers','campaigns','analytics','settings'].includes(page)) page = 'dashboard';
  currentPage = page;
  location.hash = page;
  document.getElementById('page-title').textContent = PAGE_TITLES[page];
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  // If leaving agent page while in a call, clean up
  if (page !== 'campaigns' && _campaignPollTimer) { clearInterval(_campaignPollTimer); _campaignPollTimer = null; }
  if (page !== 'agent' && activeCall) {
    document.getElementById('client-iframe')?.remove();
    activeCall = false;
  }
  const content = document.getElementById('content');
  ({
    dashboard: renderDashboard,
    agent: renderAgent,
    conversations: renderConversations,
    customers: renderCustomers,
    campaigns: renderCampaigns,
    analytics: renderAnalytics,
    settings: renderSettings,
  }[page])(content);
}

window.addEventListener('hashchange', () => {
  if (token) navigate(location.hash.replace('#','') || 'dashboard');
});

// ═══════════════════════════════════════════════════════════════
// Dashboard
// ═══════════════════════════════════════════════════════════════
async function renderDashboard(el) {
  el.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">Total Calls</div><div class="kpi-value" id="kpi-total">—</div><div class="kpi-sub">All time</div></div>
      <div class="kpi-card"><div class="kpi-label">PTP Rate</div><div class="kpi-value green" id="kpi-ptp">—</div><div class="kpi-sub">Completed calls</div></div>
      <div class="kpi-card"><div class="kpi-label">Avg Duration</div><div class="kpi-value amber" id="kpi-dur">—</div><div class="kpi-sub">Per call</div></div>
      <div class="kpi-card"><div class="kpi-label">Est. Cost</div><div class="kpi-value" id="kpi-cost">—</div><div class="kpi-sub">All time (USD)</div></div>
    </div>
    <div id="active-banner-area"></div>
    <div class="section-header">
      <span class="section-title">Recent Conversations</span>
      <button class="section-action" onclick="navigate('conversations')">View all →</button>
    </div>
    <div class="table-wrap"><table class="data-table">
      <thead><tr><th>Borrower</th><th>Pipeline</th><th>Outcome</th><th>Duration</th><th>Cost</th><th>Date</th></tr></thead>
      <tbody id="recent-rows"><tr class="empty-row"><td colspan="6">Loading…</td></tr></tbody>
    </table></div>`;

  try {
    const stats = await api('/api/stats');
    if (!stats) return;
    document.getElementById('kpi-total').textContent = stats.total;
    document.getElementById('kpi-ptp').textContent = stats.ptp_count + ' / ' + (stats.ptp_rate*100).toFixed(0)+'%';
    document.getElementById('kpi-dur').textContent = fmtDuration(stats.avg_duration_seconds);
    document.getElementById('kpi-cost').textContent = '$' + stats.total_cost_usd.toFixed(4);

    if (stats.active_now > 0) {
      document.getElementById('active-banner-area').innerHTML = `
        <div class="active-banner"><span class="pulse on"></span><strong>${stats.active_now} active call</strong> in progress — <a href="#agent" onclick="navigate('agent')" style="color:var(--accent);text-decoration:none">Monitor →</a></div>`;
    }

    const convs = await api('/api/conversations?limit=10');
    const tbody = document.getElementById('recent-rows');
    if (!convs || !convs.conversations.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No conversations yet. <a href="#agent" onclick="navigate(\'agent\')" style="color:var(--accent)">Start a call →</a></td></tr>';
    } else {
      tbody.innerHTML = convs.conversations.map(c => `
        <tr>
          <td>${c.borrower_name || '—'}</td>
          <td><span class="badge badge-stt">${c.stt_type}</span> <span class="badge badge-tts">${c.tts_type}</span></td>
          <td><span class="badge badge-${c.outcome||'incomplete'}">${fmtOutcome(c.outcome)}</span></td>
          <td>${fmtDuration(c.duration_seconds)}</td>
          <td>$${(c.estimated_cost_usd||0).toFixed(4)}</td>
          <td>${fmtDate(c.started_at)}</td>
        </tr>`).join('');
    }
  } catch(e) { console.error(e); }
}

// ═══════════════════════════════════════════════════════════════
// Voice Agent
// ═══════════════════════════════════════════════════════════════
function renderAgent(el) {
  el.innerHTML = `
    <button class="config-toggle-btn" id="cfg-toggle" onclick="toggleConfig()">
      <span>Agent Configuration</span><span class="arrow">▼</span>
    </button>
    <div class="config-panel-body" id="cfg-body">
      <div class="cfg-row">
        <div class="cfg-col">
          <h4>Agent Settings</h4>
          <div class="cfg-field"><label>Agent Name</label><input id="cfg-agent" value="Priya"></div>
          <div class="cfg-field"><label>Company</label><input id="cfg-company" value="QuickFinance Ltd."></div>
          <div class="cfg-field"><label>Language</label>
            <select id="cfg-lang"><option value="hinglish">Hinglish (Hindi + English)</option><option value="hindi">Hindi</option><option value="english">English</option></select>
          </div>
        </div>
        <div class="cfg-col">
          <h4>Borrower Scenario</h4>
          <div class="cfg-field"><label>Borrower Name</label><input id="cfg-borrower" value="Rajesh Kumar"></div>
          <div class="cfg-field-row">
            <div class="cfg-field"><label>EMI (Rs.)</label><input id="cfg-emi" value="5,280"></div>
            <div class="cfg-field"><label>Total Due (Rs.)</label><input id="cfg-total" value="11,760"></div>
          </div>
          <div class="cfg-field-row">
            <div class="cfg-field"><label>Overdue Months</label><input id="cfg-months" value="2"></div>
            <div class="cfg-field"><label>Account No.</label><input id="cfg-account" value="QF-2024-78432"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="pipeline-grid" id="pipeline-grid"></div>
    <div id="live-area"></div>`;
  buildPipelineCards();
}

function toggleConfig() {
  document.getElementById('cfg-toggle').classList.toggle('open');
  document.getElementById('cfg-body').classList.toggle('open');
}

function buildPipelineCards() {
  const grid = document.getElementById('pipeline-grid');
  if (!grid) return;
  grid.innerHTML = PIPELINES.map((p, i) => {
    if (p.type === 'inya') return buildInyaCard(p);
    const missing = (p.requires||[]).filter(k => !configStatus[k]);
    const warn = missing.length > 0;
    const warnHtml = warn ? `<div class="pipeline-warn">⚠ Requires: ${missing.map(k=>k.toUpperCase()+'_API_KEY').join(', ')}</div>` : '';
    const llmBadge = p.llm !== 'openai' ? `<span class="badge badge-llm">LLM: ${p.llm}</span>` : '';
    return `<div class="pipeline-card ${p.featured?'featured':''}">
      <h3>${p.label}</h3>
      <div class="pipeline-badges"><span class="badge badge-stt">STT: ${p.stt}</span><span class="badge badge-tts">TTS: ${p.tts}</span>${llmBadge}</div>
      <div class="pipeline-desc">${p.desc}</div>
      ${warnHtml}
      <button class="btn-connect" ${warn?'disabled':''} onclick="selectPipeline(${i})">${warn?'Unavailable':'Connect'}</button>
    </div>`;
  }).join('');
}

function buildInyaCard(p) {
  const configured = configStatus['inya'];
  const baseUrl = window.location.origin;
  const statusDot = configured
    ? `<span style="color:var(--green);font-size:.72rem">● Webhook configured</span>`
    : `<span style="color:var(--amber);font-size:.72rem">● Set INYA_WEBHOOK_SECRET to enable auth</span>`;

  const endpointRow = (method, path, note) => `
    <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem">
      <span style="font-size:.62rem;font-weight:700;padding:.15rem .4rem;border-radius:4px;background:rgba(99,102,241,.15);color:var(--accent);width:36px;text-align:center;flex-shrink:0">${method}</span>
      <code style="flex:1;font-size:.68rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${baseUrl}${path}</code>
      <button onclick="copyText('${baseUrl}${path}')" style="background:none;border:1px solid var(--faint);color:var(--muted);border-radius:4px;padding:.1rem .4rem;font-size:.62rem;cursor:pointer;flex-shrink:0">Copy</button>
    </div>
    <div style="font-size:.65rem;color:var(--faint);margin-bottom:.6rem;padding-left:44px">${note}</div>`;

  return `<div class="pipeline-card featured" style="border-color:rgba(16,185,129,.25);background:linear-gradient(135deg,#1a2133 0%,#0f2028 100%);grid-column:1/-1">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.5rem">
      <h3 style="margin:0">${p.label}</h3>
      ${statusDot}
    </div>
    <div class="pipeline-badges">
      <span class="badge badge-stt">STT: Vachana</span>
      <span class="badge badge-tts">TTS: inya</span>
      <span class="badge badge-llm">LLM: inya</span>
      <span style="font-size:.62rem;padding:.2rem .5rem;border-radius:9999px;background:rgba(16,185,129,.1);color:#34d399;font-weight:600">External Agent</span>
    </div>
    <div class="pipeline-desc">${p.desc}</div>

    <div style="background:#0b0f1a;border:1px solid var(--border);border-radius:8px;padding:.85rem;margin-bottom:.75rem">
      <div style="font-size:.68rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem">Add these in inya Dashboard → Custom Integration</div>
      ${endpointRow('GET', '/api/inya/borrower', 'On-Call · fetch borrower info. Params: account_number, phone')}
      ${endpointRow('POST', '/api/inya/outcome', 'Post-Call · report outcome. Body: outcome, borrower_name, payment_plan, duration_seconds')}
      <div style="font-size:.65rem;color:var(--faint);margin-top:.4rem">
        Auth header: <code style="color:var(--muted)">Authorization: Bearer &lt;INYA_WEBHOOK_SECRET&gt;</code>
      </div>
    </div>

    <div style="display:flex;gap:.6rem">
      <a href="https://app.inya.ai" target="_blank" style="flex:1;text-align:center;padding:.5rem;border-radius:8px;border:1px solid var(--faint);color:var(--muted);font-size:.78rem;font-weight:600;text-decoration:none;transition:all .15s"
         onmouseover="this.style.borderColor='var(--green)';this.style.color='var(--green)'"
         onmouseout="this.style.borderColor='var(--faint)';this.style.color='var(--muted)'">
        Open inya Dashboard ↗
      </a>
      <button onclick="navigate('conversations')" style="flex:1;padding:.5rem;border-radius:8px;border:none;background:rgba(16,185,129,.12);color:#34d399;font-size:.78rem;font-weight:600;cursor:pointer">
        View inya Calls →
      </button>
    </div>
  </div>`;
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    // brief visual feedback handled by the browser
  });
}

async function selectPipeline(idx) {
  const p = PIPELINES[idx];
  const config = {
    agent_name: document.getElementById('cfg-agent')?.value || 'Priya',
    company_name: document.getElementById('cfg-company')?.value || 'QuickFinance Ltd.',
    language: document.getElementById('cfg-lang')?.value || 'hinglish',
    borrower_name: document.getElementById('cfg-borrower')?.value || 'Rajesh Kumar',
    emi_amount: document.getElementById('cfg-emi')?.value || '5,280',
    total_due: document.getElementById('cfg-total')?.value || '11,760',
    overdue_months: document.getElementById('cfg-months')?.value || '2',
    account_number: document.getElementById('cfg-account')?.value || 'QF-2024-78432',
  };
  await api('/set-pipeline', { method:'POST', body: JSON.stringify({ stt:p.stt, tts:p.tts, llm:p.llm, config }) });
  showLiveSession(p);
}

function showLiveSession(p) {
  activeCall = true;
  const liveArea = document.getElementById('live-area');
  const llmBadge = p.llm !== 'openai' ? `<span class="badge badge-llm">LLM: ${p.llm}</span>` : '';
  liveArea.innerHTML = `
    <div class="client-bar">
      <div class="client-bar-info">
        <strong>${p.label}</strong>
        <span class="badge badge-stt">STT: ${p.stt}</span>
        <span class="badge badge-tts">TTS: ${p.tts}</span>
        ${llmBadge}
      </div>
      <button class="btn-back" onclick="endLiveSession()">End Call</button>
    </div>
    <div class="flow-bar" id="flow-bar-live"></div>
    <iframe id="client-iframe" src="/client/" allow="microphone" style="width:100%;height:560px;border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;background:var(--bg)"></iframe>`;
  buildFlowBar('flow-bar-live');
  // Scroll to it
  liveArea.scrollIntoView({ behavior:'smooth' });
}

function endLiveSession() {
  activeCall = false;
  const iframe = document.getElementById('client-iframe');
  if (iframe) iframe.src = 'about:blank';
  document.getElementById('live-area').innerHTML = '';
}

// ═══════════════════════════════════════════════════════════════
// Flow Bar
// ═══════════════════════════════════════════════════════════════
function buildFlowBar(containerId) {
  const bar = document.getElementById(containerId);
  if (!bar) return;
  bar.innerHTML = '';
  FLOW_NODES.forEach((node, i) => {
    const step = document.createElement('div');
    step.className = 'flow-step';
    step.innerHTML = `<div class="flow-dot" id="fd-${node.id}">${i+1}</div><span class="flow-label" id="fl-${node.id}">${node.label}</span>`;
    bar.appendChild(step);
    if (i < FLOW_NODES.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'flow-connector'; conn.id = `fc-${i}`;
      bar.appendChild(conn);
    }
  });
}

function updateFlowBar(currentNode) {
  const idx = FLOW_NODES.findIndex(n => n.id === currentNode);
  if (idx < 0) return;
  FLOW_NODES.forEach((node, i) => {
    const dot = document.getElementById(`fd-${node.id}`);
    const lbl = document.getElementById(`fl-${node.id}`);
    const conn = document.getElementById(`fc-${i}`);
    if (!dot) return;
    dot.className = 'flow-dot' + (i < idx ? ' done' : i === idx ? ' active' : '');
    if (lbl) lbl.className = 'flow-label' + (i < idx ? ' done' : i === idx ? ' active' : '');
    if (conn) conn.classList.toggle('done', i < idx);
  });
}

async function pollActiveFlow() {
  // Update active call indicator
  try {
    const data = await fetch('/api/active-flow').then(r=>r.json());
    const active = data && data.current_node;
    const pulse = document.getElementById('active-pulse');
    const label = document.getElementById('active-label');
    if (pulse && label) {
      if (active) { pulse.classList.add('on'); label.textContent = 'Active call'; }
      else { pulse.classList.remove('on'); label.textContent = 'No active call'; }
    }
    if (active && currentPage === 'agent') updateFlowBar(data.current_node);
  } catch(e) {}
}

let _searchTimer;
function debounceSearch() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(applyFilter, 400);
}

async function applyFilter() {
  convFilter.search = document.getElementById('conv-search')?.value || '';
  convFilter.outcome = document.getElementById('conv-outcome')?.value || '';
  convPage = 1;
  await loadConversations();
}

async function loadConversations() {
  const params = new URLSearchParams({ page: convPage, limit: 15 });
  if (convFilter.outcome) params.append('outcome', convFilter.outcome);
  if (convFilter.search) params.append('search', convFilter.search);
  const data = await api('/api/conversations?' + params);
  if (!data) return;
  const tbody = document.getElementById('conv-rows');
  if (!tbody) return;
  if (!data.conversations.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="9">No conversations found.</td></tr>';
    document.getElementById('conv-pagination').innerHTML = '';
    return;
  }
  tbody.innerHTML = data.conversations.map(c => `
    <tr>
      <td style="color:var(--faint)">#${c.id}</td>
      <td><strong>${c.borrower_name||'—'}</strong><div style="font-size:.68rem;color:var(--faint)">${c.account_number||''}</div></td>
      <td><span class="badge badge-stt">${c.stt_type}</span> <span class="badge badge-tts">${c.tts_type}</span></td>
      <td><span class="badge badge-${c.outcome||'incomplete'}">${fmtOutcome(c.outcome)}</span></td>
      <td style="font-size:.75rem;color:var(--muted);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.payment_plan||'—'}</td>
      <td>${fmtDuration(c.duration_seconds)}</td>
      <td>$${(c.estimated_cost_usd||0).toFixed(4)}</td>
      <td style="color:var(--muted)">${fmtDate(c.started_at)}</td>
      <td><button class="btn-view" onclick="viewTranscript(${c.id})">Transcript</button></td>
    </tr>`).join('');

  const totalPages = Math.ceil(data.total / 15);
  const pg = document.getElementById('conv-pagination');
  pg.innerHTML = `<span>${data.total} conversations</span>
    <div class="page-btns">
      ${convPage > 1 ? `<button class="btn-page" onclick="changePage(${convPage-1})">← Prev</button>` : ''}
      <button class="btn-page current">Page ${convPage}</button>
      ${convPage < totalPages ? `<button class="btn-page" onclick="changePage(${convPage+1})">Next →</button>` : ''}
    </div>`;
}

async function changePage(p) { convPage = p; await loadConversations(); }

async function viewTranscript(id) {
  const data = await api(`/api/conversations/${id}`);
  if (!data) return;
  document.getElementById('modal-title').textContent = `${data.borrower_name || 'Conversation'} #${id}`;
  document.getElementById('modal-meta').innerHTML = `
    <span>📋 ${fmtOutcome(data.outcome)}</span>
    <span>⏱ ${fmtDuration(data.duration_seconds)}</span>
    <span>💰 $${(data.estimated_cost_usd||0).toFixed(4)}</span>
    <span>🔧 ${data.stt_type}+${data.tts_type}+${data.llm_type}</span>
    ${data.payment_plan ? `<span>🤝 ${data.payment_plan}</span>` : ''}
    ${data.payment_date ? `<span>📅 ${data.payment_date}</span>` : ''}`;
  const body = document.getElementById('modal-body');
  if (!data.transcript || !data.transcript.length) {
    body.innerHTML = '<p style="color:var(--muted);text-align:center">No transcript available.</p>';
  } else {
    body.innerHTML = data.transcript.map(m => `
      <div class="msg ${m.role}">
        <div class="msg-role">${m.role === 'user' ? '👤 Borrower' : '🤖 Agent'}</div>
        ${m.text}
      </div>`).join('');
  }
  document.getElementById('transcript-modal').style.display = 'flex';
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('transcript-modal'))
    document.getElementById('transcript-modal').style.display = 'none';
}

      </div>

async function loadCustomers() {
  const params = new URLSearchParams({ page: _custPage, limit: 30, search: _custSearch });
  const r = await api(`/api/customers?${params}`);
  if (!r) return;
  const tb = document.getElementById('cust-tbody');
  const ct = document.getElementById('cust-count');
  if (ct) ct.textContent = `${r.total} customers`;
  if (!r.customers.length) {
    tb.innerHTML = '<tr class="empty-row"><td colspan="8">No customers yet. Upload a CSV or add one above.</td></tr>';
    return;
  }
  tb.innerHTML = r.customers.map(c => `
    <tr>
      <td>${esc(c.name)}</td>
      <td style="font-family:monospace">${esc(c.phone)}</td>
      <td>${esc(c.account_number||'—')}</td>
      <td>${c.emi_amount ? '₹'+esc(c.emi_amount) : '—'}</td>
      <td>${c.total_due ? '₹'+esc(c.total_due) : '—'}</td>
      <td>${esc(c.overdue_months||'—')}</td>
      <td>${fmtDate(c.created_at)}</td>
      <td><button class="btn-ghost" style="color:var(--red);font-size:.75rem" onclick="deleteCustomer(${c.id})">Delete</button></td>
    </tr>`).join('');
  const pages = Math.ceil(r.total / 30);
  const pg = document.getElementById('cust-pager');
  if (pg) pg.innerHTML = pages > 1 ? Array.from({length:pages},(_,i)=>
    `<button class="btn${i+1===_custPage?'':'-ghost'}" style="padding:.3rem .6rem;font-size:.75rem" onclick="_custPage=${i+1};loadCustomers()">${i+1}</button>`).join('') : '';

async function addCustomer() {
  const name = document.getElementById('add-name').value.trim();
  const phone = document.getElementById('add-phone').value.trim();
  const msg = document.getElementById('add-cust-msg');
  if (!name || !phone) { msg.innerHTML = '<span style="color:var(--red)">Name and phone are required.</span>'; return; }
  const body = { name, phone,
    account_number: document.getElementById('add-acc').value.trim()||null,
    emi_amount: document.getElementById('add-emi').value.trim()||null,
    total_due: document.getElementById('add-due').value.trim()||null,
    overdue_months: document.getElementById('add-months').value.trim()||null,
  };
  const r = await api('/api/customers', { method:'POST', body: JSON.stringify(body) });
  if (r) {
    msg.innerHTML = `<span style="color:var(--green)">Added ${esc(r.name)} (${esc(r.phone)})</span>`;
    ['add-name','add-phone','add-acc','add-emi','add-due','add-months'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
    loadCustomers();
  }
}

async function deleteCustomer(id) {
  if (!confirm('Delete this customer?')) return;
  const r = await api(`/api/customers/${id}`, { method:'DELETE' });
  if (r) loadCustomers();
}

async function handleCsvDrop(e) {
  e.preventDefault();
  document.getElementById('csv-drop-zone').style.borderColor = 'var(--border)';
  const file = e.dataTransfer.files[0];
  if (file) uploadCsv(file);
}

async function uploadCsv(file) {
  if (!file) return;
  const res = document.getElementById('csv-result');
  res.textContent = 'Uploading…';
  const fd = new FormData();
  fd.append('file', file);
  try {
    const resp = await fetch('/api/customers/upload', { method:'POST', headers:{ Authorization:`Bearer ${token}` }, body:fd });
    const data = await resp.json();
    if (!resp.ok) { res.innerHTML = `<span style="color:var(--red)">${esc(data.detail||'Upload failed')}</span>`; return; }
    res.innerHTML = `<span style="color:var(--green)">Imported ${data.imported} customers.</span>` +
      (data.errors.length ? ` <span style="color:var(--amber)">${data.errors.length} row(s) skipped.</span>` : '');
    loadCustomers();
  } catch(e) { res.innerHTML = `<span style="color:var(--red)">Upload error: ${esc(e.message)}</span>`; }
}

            <select id="camp-tts" class="input" style="width:100%">
              <option value="openai">OpenAI</option>
              <option value="edge">Edge TTS (free)</option>
              <option value="sarvam">Sarvam</option>
            </select></div>
          <div><label class="field-label">LLM</label>
            <select id="camp-llm" class="input" style="width:100%">
              <option value="openai">OpenAI GPT-4o</option>
              <option value="ollama">Groq / Ollama</option>
            </select></div>
        </div>
        <div style="margin-bottom:.5rem;font-weight:600;font-size:.85rem">Select Customers</div>
        <input id="camp-cust-search" class="input" style="width:100%;margin-bottom:.5rem" placeholder="Search customers…" oninput="filterCampCustomers(this.value)">
        <div id="camp-cust-list" style="max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:.4rem">Loading…</div>
        <div style="font-size:.75rem;color:var(--muted);margin-top:.3rem" id="camp-cust-count">0 selected</div>
        <div style="display:flex;justify-content:flex-end;gap:.5rem;margin-top:1rem">
          <button class="btn-ghost" onclick="closeModal('camp-modal')">Cancel</button>
          <button class="btn" onclick="createCampaign()">Create Campaign</button>
        </div>
        <div id="camp-create-msg" style="margin-top:.4rem;font-size:.8rem"></div>
      </div>
    </div>
  `;
  loadCampaigns();
  if (_campaignPollTimer) clearInterval(_campaignPollTimer);
  _campaignPollTimer = setInterval(loadCampaigns, 5000);
}

let _allCampCustomers = [];
async function openNewCampaignModal() {
  document.getElementById('camp-modal').style.display = 'flex';
  const r = await api('/api/customers?limit=500');
  if (!r) return;
  _allCampCustomers = r.customers || [];
  renderCampCustomerList(_allCampCustomers);
}

function filterCampCustomers(q) {
  const filtered = _allCampCustomers.filter(c =>
    c.name.toLowerCase().includes(q.toLowerCase()) || c.phone.includes(q));
  renderCampCustomerList(filtered);
}

function renderCampCustomerList(customers) {
  const el = document.getElementById('camp-cust-list');
  if (!el) return;
  if (!customers.length) { el.innerHTML = '<div style="padding:.5rem;color:var(--muted)">No customers found.</div>'; return; }
  el.innerHTML = customers.map(c => `
    <label style="display:flex;align-items:center;gap:.5rem;padding:.4rem .5rem;border-radius:6px;cursor:pointer;transition:background .1s" onmouseover="this.style.background='rgba(255,255,255,.04)'" onmouseout="this.style.background=''">
      <input type="checkbox" class="camp-cust-cb" value="${c.id}" onchange="updateCampCount()">
      <span style="flex:1">${esc(c.name)}</span>
      <span style="font-size:.75rem;color:var(--muted);font-family:monospace">${esc(c.phone)}</span>
      <span style="font-size:.72rem;color:var(--faint)">${c.total_due ? '₹'+c.total_due+' due' : ''}</span>
    </label>`).join('');
}

function updateCampCount() {
  const n = document.querySelectorAll('.camp-cust-cb:checked').length;
  const el = document.getElementById('camp-cust-count');
  if (el) el.textContent = `${n} selected`;
}

function closeModal(id) { const el = document.getElementById(id); if(el) el.style.display='none'; }

async function createCampaign() {
  const name = (document.getElementById('camp-name').value||'').trim();
  const provider = document.getElementById('camp-provider').value;
  const stt = document.getElementById('camp-stt').value;
  const tts = document.getElementById('camp-tts').value;
  const llm = document.getElementById('camp-llm').value;
  const ids = [...document.querySelectorAll('.camp-cust-cb:checked')].map(cb => parseInt(cb.value));
  const msg = document.getElementById('camp-create-msg');
  if (!name) { msg.innerHTML = '<span style="color:var(--red)">Name is required.</span>'; return; }
  if (!ids.length) { msg.innerHTML = '<span style="color:var(--red)">Select at least one customer.</span>'; return; }
  const r = await api('/api/campaigns', { method:'POST', body: JSON.stringify({ name, provider, stt, tts, llm, customer_ids: ids }) });
  if (r) {
    closeModal('camp-modal');
    loadCampaigns();
  }
}

async function loadCampaigns() {
  const camps = await api('/api/campaigns');
  if (!camps) return;
  const el = document.getElementById('campaign-list');
  if (!el) { clearInterval(_campaignPollTimer); return; }
  if (!camps.length) {
    el.innerHTML = '<div style="color:var(--muted);padding:2rem;text-align:center">No campaigns yet. Create one above.</div>';
    return;
  }
  el.innerHTML = camps.map(c => {
    const progress = c.total_customers ? Math.round(c.calls_completed / c.total_customers * 100) : 0;
    const statusColor = { running:'var(--green)', paused:'var(--amber)', completed:'var(--blue)', draft:'var(--muted)' }[c.status]||'var(--muted)';
    return `
    <div class="card" style="margin-bottom:.75rem">
      <div style="display:flex;align-items:flex-start;gap:1rem;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem">
            <span style="font-weight:600">${esc(c.name)}</span>
            <span style="padding:.15rem .45rem;border-radius:99px;font-size:.7rem;font-weight:600;background:${statusColor}22;color:${statusColor};text-transform:capitalize">${c.status}</span>
            <span style="font-size:.72rem;color:var(--muted)">${c.provider}</span>
          </div>
          <div style="background:var(--border);border-radius:99px;height:6px;margin-bottom:.3rem;overflow:hidden">
            <div style="background:var(--accent);height:100%;width:${progress}%;border-radius:99px;transition:width .3s"></div>
          </div>
          <div style="font-size:.75rem;color:var(--muted)">${c.calls_completed}/${c.total_customers} completed • ${c.ptp_count} PTP • ${c.payment_confirmed_count} paid</div>
        </div>
        <div style="display:flex;gap:.4rem;align-items:center;flex-shrink:0">
          ${c.status==='draft'||c.status==='paused' ? `<button class="btn" style="padding:.35rem .9rem;font-size:.8rem" onclick="startCampaign(${c.id})">▶ ${c.status==='paused'?'Resume':'Start'}</button>` : ''}
          ${c.status==='running' ? `<button class="btn-ghost" style="padding:.35rem .9rem;font-size:.8rem" onclick="pauseCampaign(${c.id})">⏸ Pause</button>` : ''}
          <button class="btn-ghost" style="padding:.35rem .9rem;font-size:.8rem" onclick="toggleCampaignDetail(${c.id})">Details</button>
        </div>
      </div>
      <div id="camp-detail-${c.id}" style="display:none;margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem"></div>
    </div>`;
  }).join('');
}

async function startCampaign(id) {
  const r = await api(`/api/campaigns/${id}/start`, { method:'POST' });
  if (r) loadCampaigns();
}

async function pauseCampaign(id) {
  const r = await api(`/api/campaigns/${id}/pause`, { method:'POST' });
  if (r) loadCampaigns();
}

async function toggleCampaignDetail(id) {
  const el = document.getElementById(`camp-detail-${id}`);
  if (!el) return;
  if (el.style.display === 'block') { el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.innerHTML = 'Loading calls…';
  const calls = await api(`/api/campaigns/${id}/calls`);
  if (!calls || !calls.length) { el.innerHTML = '<span style="color:var(--muted)">No calls yet.</span>'; return; }
  const statusColor = s => ({ pending:'var(--muted)', dialing:'var(--amber)', in_progress:'var(--blue)', completed:'var(--green)', failed:'var(--red)', no_answer:'var(--red)', busy:'var(--amber)' }[s]||'var(--muted)');
  const outcomeBadge = o => { const m = { ptp:'PTP', callback:'Callback', wrong_person:'Wrong Person', incomplete:'Incomplete', payment_confirmed:'Paid ✓' }; return o ? `<span style="font-size:.7rem;padding:.1rem .35rem;border-radius:4px;background:rgba(99,102,241,.15);color:var(--accent)">${m[o]||o}</span>` : ''; };
  el.innerHTML = `<div class="table-wrap"><table class="data-table"><thead><tr><th>Customer</th><th>Phone</th><th>Status</th><th>Outcome</th><th>Payment</th><th>Duration</th><th>Time</th></tr></thead><tbody>
    ${calls.map(cc=>`<tr>
      <td>${esc(cc.customer_name)}</td>
      <td style="font-family:monospace;font-size:.78rem">${esc(cc.customer_phone)}</td>
      <td><span style="color:${statusColor(cc.call_status)}">${cc.call_status}</span></td>
      <td>${outcomeBadge(cc.outcome)}</td>
      <td>${cc.payment_amount ? '₹'+cc.payment_amount : '—'} ${cc.has_receipt===true?'🧾':cc.has_receipt===false?'(no receipt)':''}</td>
      <td>${fmtDuration(cc.duration_seconds)}</td>
      <td>${fmtDate(cc.started_at)}</td>
    </tr>`).join('')}
  </tbody></table></div>`;
}

function esc(s) {
  if (!s && s !== 0) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════════════════════════
function fmtDuration(s) {
  if (!s && s !== 0) return '—';
  const m = Math.floor(s / 60), sec = Math.round(s % 60);
  return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}

function fmtOutcome(o) {
  return { ptp:'PTP', callback:'Callback', wrong_person:'Wrong Person', incomplete:'Incomplete' }[o] || o || 'Unknown';
}
</script>
</body>
</html>
